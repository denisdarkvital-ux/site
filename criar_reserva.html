{% extends "base.html" %}
{% block title %}Criar Reserva{% endblock %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <i class="bi bi-plus-circle"></i> Criar Nova Reserva
    </div>

    <div class="card-body">

        {% if erro %}
        <div class="alert alert-danger">{{ erro }}</div>
        {% endif %}

        <form action="/criar-reserva" method="POST">

            <div class="mb-3">
                <label class="form-label">Recurso</label>
                <select name="recurso_id" class="form-control" required>
                    <option value="">-- Escolha um recurso --</option>
                    {% for r in recursos %}
                        <option value="{{ r.id }}">{{ r.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Data</label>
                <input class="form-control" type="date" name="data" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Hora</label>
                <input class="form-control" type="time" name="hora" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Observações</label>
                <textarea class="form-control" name="observacoes" placeholder="Observações opcionais"></textarea>
            </div>

            <button class="btn btn-success">
                <i class="bi bi-check-circle"></i> Criar Reserva
            </button>

            <a href="/reservas" class="btn btn-secondary ms-2">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>

        </form>
    </div>
</div>

{% endblock %}
